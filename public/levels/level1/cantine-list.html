<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantine - EnoHub</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <script src="../../scripts/api.js" defer></script>
    <script src="../../scripts/ui.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__content">
                <a href="../../index.html" class="header__logo">EnoHub</a>
                <nav class="header__nav">
                    <ul>
                        <li><a href="cantine-list.html">Cantine</a></li>
                        <li><a href="sommelier-list.html">Sommelier</a></li>
                        <li><a href="events-list.html">Eventi</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="cantine-list__content">
            <aside class="filter-box">
                <h3>Filtra Cantine</h3>
                <form id="filterCantine">
                    <div class="filter-box__group">
                        <label class="filter-box__label">Regione:</label>
                        <input type="text" id="f-regione" class="filter-box__input" placeholder="Es. Chianti, Etna...">
                    </div>
                    <div class="filter-box__group">
                        <label class="filter-box__label">Filosofia:</label>
                        <input type="text" id="f-filosofia" class="filter-box__input" placeholder="Es. Biologico, Tradizionale...">
                    </div>
                    <div class="filter-box__group">
                        <label class="filter-box__label">Nome Cantina:</label>
                        <input type="text" id="f-nome" class="filter-box__input" placeholder="Cerca nome...">
                    </div>
                    <button type="submit" class="filter-box__btn">Cerca</button>
                </form>
            </aside>

            <section class="cantine-grid" id="cantineGrid">
                <p>Caricamento cantine...</p>
            </section>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Chiamata all'API per caricare le cantine
            const cantine = await EnoHubApi.getCantineList();
            const grid = document.getElementById('cantineGrid');
            grid.innerHTML = '';

            cantine.forEach(c => {
                grid.innerHTML += `
                    <div class="cantine-card">
                        <div class="cantine-card__img">
                            <img src="../../${c.foto || 'uploads/profiles/default-cantina.jpg'}" alt="${c.nome}">
                        </div>
                        <div class="cantine-card__body">
                            <h3>${c.nome}</h3>
                            <p>${c.regione || c.citta}</p>
                            <div class="sommelier-card__tags">
                                <span class="sommelier-card__tag">${c.filosofia || 'Classica'}</span>
                            </div>
                            <a href="cantine-profile.html?id=${c.id}" class="btn-vedi-profilo">Vedi Pagina</a>
                        </div>
                    </div>
                `;
            });

            // Logica Filtro
            document.getElementById('filterCantine').addEventListener('submit', (e) => {
                e.preventDefault();
                const nome = document.getElementById('f-nome').value.toLowerCase();
                document.querySelectorAll('.cantine-card').forEach(card => {
                    const text = card.innerText.toLowerCase();
                    card.style.display = text.includes(nome) ? 'block' : 'none';
                });
            });
        });
    </script>
</body>
</html>
