<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Cantina - EnoHub</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <script src="../../scripts/api.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="container"><a href="../../index.html" class="header__logo">EnoHub</a></div>
    </header>

    <div class="cantine-profile__banner">
        <img id="c-banner" src="../../uploads/profiles/default-banner.jpg" alt="Banner Cantina">
    </div>

    <main class="cantine-profile__container">
        <div class="cantine-profile__main">
            <div class="profile-info__header">
                <img id="c-logo" src="" alt="Logo" style="width: 80px; border-radius: 8px; margin-bottom: 10px;">
                <h1 id="c-nome">Nome Cantina</h1>
                <p id="c-sottotitolo" class="profile-info__subtitle">Regione, DOCG</p>
            </div>

            <section class="profile-section">
                <h2>La Nostra Storia</h2>
                <p id="c-bio">Racconto della tradizione vinicola...</p>
            </section>

            <section class="profile-section">
                <h2>Galleria</h2>
                <div class="galleria-grid" id="c-galleria">
                    <div class="galleria-item"><img src="../../uploads/profiles/wine1.jpg"></div>
                    <div class="galleria-item"><img src="../../uploads/profiles/wine2.jpg"></div>
                </div>
            </section>
        </div>

        <aside class="cantine-profile__sidebar">
            <h3>In Breve</h3>
            <div class="sidebar-data-box">
                <p class="sidebar-data-label">Regione:</p>
                <p id="c-regione" class="sidebar-data-value">-</p>
            </div>
            <div class="sidebar-data-box">
                <p class="sidebar-data-label">Filosofia:</p>
                <p id="c-filosofia" class="sidebar-data-value">-</p>
            </div>
            <div class="sidebar-data-box">
                <p class="sidebar-data-label">Sito Web:</p>
                <p class="sidebar-data-value"><a id="c-web" href="#">Visita il sito</a></p>
            </div>

            <div id="contactArea">
                <p class="text-muted">Effettua il login per vedere i contatti commerciali.</p>
                <a href="../../auth/login.html" class="btn-contatta-cantina" style="text-align: center; display: block;">Accedi</a>
            </div>
        </aside>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (!id) return window.location.href = 'cantine-list.html';

            const c = await EnoHubApi.getCantinaProfile(id);
            
            // Popolamento Dati
            document.getElementById('c-nome').innerText = c.nome;
            document.getElementById('c-sottotitolo').innerText = `${c.regione}, ${c.qualifica || 'DOCG'}`;
            document.getElementById('c-bio').innerText = c.bio || 'La storia di questa cantina è in fase di aggiornamento.';
            document.getElementById('c-regione').innerText = c.regione;
            document.getElementById('c-filosofia').innerText = c.specializzazione || 'Tradizionale';
            document.getElementById('c-logo').src = '../../' + (c.foto || 'uploads/profiles/default-avatar.png');

            // Se l'utente è loggato, mostriamo il tasto Chat e i contatti reali
            if (EnoHubApi.isLoggedIn()) {
                document.getElementById('contactArea').innerHTML = `
                    <button onclick="location.href='chat.html?cid=${c.id}'" class="btn-contatta-cantina">Contatta la Cantina</button>
                    <p style="margin-top:10px"><strong>Email:</strong> ${c.email}</p>
                `;
            }
        });
    </script>
</body>
</html>
