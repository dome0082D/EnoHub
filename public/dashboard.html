<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EnoHub - Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .profile-card { max-width: 850px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .profile-header { display: flex; align-items: center; padding: 40px; border-bottom: 1px solid #eee; }
        .avatar { width: 140px; height: 140px; border-radius: 50%; margin-right: 35px; border: 3px solid #800000; object-fit: cover; }
        .btn-msg { background: #800000; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .row { display: grid; grid-template-columns: 180px 1fr; padding: 20px 40px; }
        .label { color: #800000; font-weight: bold; text-transform: uppercase; font-size: 13px; }
    </style>
</head>
<body>
    <div style="max-width:850px; margin: 0 auto 15px; display: flex; justify-content: space-between;">
        <a href="index.html" style="color:#800000; text-decoration:none; font-weight:bold;">← Home Page</a>
        <span id="header-user-name" style="color:#666;"></span>
    </div>
    
    <div class="profile-card">
        <div class="profile-header">
            <img id="display-foto" src="https://via.placeholder.com/140" class="avatar">
            <div class="header-info">
                <h1 id="display-nome">Caricamento...</h1>
                <p id="display-tipo" style="color:#666; font-size:18px; margin: 5px 0;"></p>
                <span style="color:#27ae60; font-weight:bold; font-size: 14px;">● Profilo Verificato EnoHub</span><br><br>
                <button class="btn-msg" onclick="alert('Sistema di messaggistica attivo.')">Richiedi Contatto</button>
            </div>
        </div>
        <div class="row"><div class="label">Bio Professionale</div><div id="display-bio">Nessuna bio presente.</div></div>
        <div class="row"><div class="label">Competenze</div><div id="display-tags">In attesa di dati...</div></div>
    </div>

    <script>
        const socket = io();
        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('enohub_user');
            if (!userData) { window.location.href = "auth/login.html"; return; }
            
            const user = JSON.parse(userData);
            // Inserimento dati reali dell'utente
            document.getElementById('display-nome').innerText = user.nome;
            document.getElementById('display-tipo').innerText = user.tipo || "Membro Professionista";
            document.getElementById('display-bio').innerText = user.bio || "Biografia non ancora compilata.";
            document.getElementById('header-user-name').innerText = `Loggato come: ${user.nome}`;
            
            if(user.foto) document.getElementById('display-foto').src = "/" + user.foto;
            
            socket.emit('join', user.id);
        });
    </script>
</body>
</html>
