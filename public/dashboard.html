<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub - Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; display: flex; flex-direction: column; height: 100vh; }
        .header { background: white; padding: 10px 5%; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100%; padding: 20px; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .progress-bar { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; display:none; }
        .progress-fill { background: #800000; height: 100%; width: 0%; border-radius: 5px; }
        .chat-box { position: fixed; bottom: 10px; right: 10px; width: 300px; height: 400px; background: white; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); display:none; flex-direction: column; }
        video { width: 100%; border-radius: 5px; }
        @media (max-width: 700px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" style="color:#800000; font-weight:bold; text-decoration:none;">EnoHub Home</a>
        <span id="user-head"></span>
    </div>
    <div style="display:flex; flex:1">
        <div class="sidebar">
            <div onclick="showSection('profile')" style="padding:15px; cursor:pointer">Mio Profilo</div>
            <div onclick="showSection('media')" style="padding:15px; cursor:pointer">Libreria Media</div>
            <div onclick="showSection('settings')" style="padding:15px; cursor:pointer">Impostazioni</div>
            <div onclick="logout()" style="padding:15px; cursor:pointer; color:#e74c3c">Esci</div>
        </div>
        <div class="content">
            <section id="sec-profile" class="card">
                <h2 id="prof-nome"></h2>
                <p id="prof-bio"></p>
                <button class="btn" onclick="alert('Usa la sidebar per esplorare utenti e avviare chat')">Avvia Chat Privata</button>
            </section>
            <section id="sec-media" class="card" style="display:none">
                <h3>Caricamento Media con %</h3>
                <input type="file" id="f-in">
                <div class="progress-bar" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>
                <button onclick="upload()">CARICA FILE</button>
                <div id="media-list"></div>
            </section>
            <section id="sec-settings" class="card" style="display:none">
                <h3>Cambia Bio / Profilo</h3>
                <textarea id="set-bio" style="width:100%; height:100px"></textarea><br><br>
                <button onclick="saveSettings()">Salva Impostazioni</button>
            </section>
        </div>
    </div>

    <div id="chat-ui" class="chat-box">
        <div style="background:#800000; color:white; padding:10px">Chat</div>
        <div id="chat-msgs" style="flex:1; overflow-y:auto; padding:10px"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #eee">
            <input type="text" id="chat-in" style="flex:1">
            <button onclick="send()">></button>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('enohub_user'));
        const socket = io(); socket.emit('join', user.id);

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.getElementById('sec-' + id).style.display = 'block';
            if(id === 'media') loadMedia();
        }

        function upload() {
            const file = document.getElementById('f-in').files[0];
            const fd = new FormData(); fd.append('file', file); fd.append('ownerId', user.id);
            const xhr = new XMLHttpRequest();
            document.getElementById('p-bar').style.display='block';
            xhr.upload.onprogress = (e) => document.getElementById('p-fill').style.width = Math.round((e.loaded/e.total)*100)+'%';
            xhr.onload = () => { alert("Caricato!"); loadMedia(); };
            xhr.open('POST', '/api/upload'); xhr.send(fd);
        }

        async function loadMedia() {
            const res = await fetch('/api/media'); const items = await res.json();
            const list = document.getElementById('media-list'); list.innerHTML = '';
            items.forEach(m => {
                const isVid = m.type.includes('video');
                list.innerHTML += `<div class="card">
                    <b>${m.name}</b><br>
                    ${isVid ? `<video id="v-${m.id}" src="${m.url}" controls></video><br>
                    <button onclick="document.getElementById('v-${m.id}').currentTime-=10">-10s</button>
                    <button onclick="document.getElementById('v-${m.id}').currentTime+=10">+10s</button>` : `<img src="${m.url}" style="width:100px">`}
                    ${m.ownerId === user.id ? `<br><button onclick="delMedia('${m.id}')">Elimina</button>` : ''}
                </div>`;
            });
        }

        async function delMedia(id) { await fetch('/api/media/'+id, {method:'DELETE'}); loadMedia(); }

        async function saveSettings() {
            const res = await fetch('/api/user/'+user.id, {
                method:'PUT', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ bio: document.getElementById('set-bio').value })
            });
            const data = await res.json();
            localStorage.setItem('enohub_user', JSON.stringify(data.user));
            location.reload();
        }

        function logout() { localStorage.clear(); location.href="../index.html"; }
        document.getElementById('prof-nome').innerText = user.nome;
        document.getElementById('user-head').innerText = user.nome;
    </script>
</body>
</html>
