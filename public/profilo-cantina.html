<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Cantina - EnoHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">EnoHub</a>
        <div id="nav-auth"></div>
    </header>

    <main class="container">
        <button class="btn-back" onclick="history.back()">⬅ Torna alla lista</button>

        <section class="profile-card">
            <div class="profile-main-info">
                <div class="profile-img-container">
                    <img id="c-foto" src="placeholder-winery.jpg" alt="Logo Cantina">
                </div>
                <div class="profile-text-header">
                    <h1 id="c-nome">Nome Cantina</h1>
                    <p class="location-badge"><span id="c-regione">Regione</span>, <span id="c-citta">Città</span></p>
                    <p class="wine-type" id="c-specializzazione">Specialità: Vini Rossi, Biologici</p>
                </div>
            </div>

            <div class="profile-details-grid">
                <div class="data-box bio-box">
                    <h3>La nostra Storia</h3>
                    <p id="c-bio">Caricamento dello storytelling aziendale...</p>
                </div>

                <div class="data-box contact-box" id="private-data">
                    <h3>Contatti Commerciali B2B</h3>
                    <div id="contact-content">
                        <p><strong>Email Commerciale:</strong> <span id="c-email">••••••••</span></p>
                        <p><strong>Telefono/WhatsApp:</strong> <span id="c-tel">••••••••</span></p>
                    </div>
                </div>

                <div class="data-box sponsorship-box">
                    <h3>Sommelier che collaborano con noi</h3>
                    <div id="c-sommelier-list" class="mini-grid">
                        </div>
                </div>
            </div>

            <div class="profile-actions" id="action-bar">
                <button class="btn-chat" id="chat-btn">💬 Contatta la Cantina</button>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
    <script>
        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const currentUser = JSON.parse(localStorage.getItem('enoUser'));

            if (!id) return location.href = 'index.html';

            const res = await fetch(`/api/utenti/${id}`);
            const data = await res.json();

            // Popola Dati
            document.getElementById('c-nome').innerText = data.nome;
            document.getElementById('c-regione').innerText = data.regione;
            document.getElementById('c-citta').innerText = data.citta;
            document.getElementById('c-bio').innerText = data.bio;
            document.getElementById('c-foto').src = data.foto || 'uploads/default-winery.png';

            if (currentUser) {
                document.getElementById('c-email').innerText = data.email;
                document.getElementById('c-tel').innerText = data.tel;
                document.getElementById('chat-btn').onclick = () => location.href = `chat.html?dest=${data.id}`;
            } else {
                document.getElementById('action-bar').innerHTML = `<p class="msg-lock">Registrati come Sommelier per chattare con questa cantina.</p>`;
            }
        };
    </script>
</body>
</html>
