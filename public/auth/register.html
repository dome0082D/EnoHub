<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EnoHub - Registrazione</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="../scripts/api.js"></script>
</head>
<body class="auth-page">
    <div class="auth__content" style="max-width: 500px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="color: var(--wine-red); text-align: center; margin-bottom: 20px;">Crea il tuo Profilo</h2>
        
        <form id="registerForm">
            <div style="margin-bottom: 15px;">
                <select id="tipo" class="auth__input" style="width: 100%; padding: 10px;" required>
                    <option value="" disabled selected>Seleziona Tipo Profilo...</option>
                    <option value="sommelier">Sommelier / Professionista</option>
                    <option value="cantina">Cantina / Azienda Agricola</option>
                </select>
            </div>
            <div style="margin-bottom: 15px;"><input type="text" id="nome" class="auth__input" placeholder="Nome (o Nome Cantina)" style="width: 100%; padding: 10px;" required></div>
            <div style="margin-bottom: 15px;"><input type="text" id="cognome" class="auth__input" placeholder="Cognome (lascia vuoto se Cantina)" style="width: 100%; padding: 10px;"></div>
            <div style="margin-bottom: 15px;"><input type="email" id="email" class="auth__input" placeholder="Email" style="width: 100%; padding: 10px;" required></div>
            <div style="margin-bottom: 15px;"><input type="password" id="password" class="auth__input" placeholder="Password" style="width: 100%; padding: 10px;" required></div>
            <div style="margin-bottom: 15px;"><input type="text" id="citta" class="auth__input" placeholder="Città / Regione" style="width: 100%; padding: 10px;" required></div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.9rem; color: #666;">Foto Profilo / Logo:</label>
                <input type="file" id="foto" accept="image/*" style="width: 100%;">
            </div>

            <div style="margin-bottom: 20px;">
                <input type="checkbox" id="privacy" required>
                <label for="privacy" style="font-size: 0.8rem; color: #666;">Accetto i Termini di Servizio e l'informativa sulla Privacy (GDPR).</label>
            </div>
            
            <button type="submit" class="btn-red" style="width: 100%; padding: 12px; font-weight: bold;">REGISTRATI</button>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "CARICAMENTO...";
            
            const fd = new FormData();
            fd.append('tipo', document.getElementById('tipo').value);
            fd.append('nome', document.getElementById('nome').value);
            fd.append('cognome', document.getElementById('cognome').value);
            fd.append('email', document.getElementById('email').value);
            fd.append('password', document.getElementById('password').value);
            fd.append('citta', document.getElementById('citta').value);
            
            if(document.getElementById('foto').files[0]) {
                fd.append('foto', document.getElementById('foto').files[0]);
            }

            const res = await fetch('/api/register', { method: 'POST', body: fd });
            const data = await res.json();
            
            if(data.success) {
                alert("Registrazione completata! Ora puoi fare il login.");
                window.location.href = "login.html";
            } else {
                alert("Errore: " + data.error);
                btn.innerText = "REGISTRATI";
            }
        });
    </script>
</body>
</html>
