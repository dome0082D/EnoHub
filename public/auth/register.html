<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - EnoHub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #800000; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #600000; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#800000; margin-top:0;">Iscriviti a EnoHub</h2>
        <input type="text" id="nome" placeholder="Nome Completo / Cantina">
        <input type="email" id="email" placeholder="Indirizzo Email">
        <input type="password" id="password" placeholder="Password">
        <select id="tipo">
            <option value="Sommelier">Sommelier</option>
            <option value="Cantina">Cantina</option>
        </select>
        <button class="btn" onclick="register()">CREA ACCOUNT</button>
        <p style="margin-top:20px;"><a href="../index.html" style="color:#666; font-size:14px; text-decoration:none;">← Torna alla Home</a></p>
    </div>

    <script>
        async function register() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const tipo = document.getElementById('tipo').value;

            if(!nome || !email || !password) {
                return alert("Per favore, compila tutti i campi!");
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, password, tipo })
                });
                
                const result = await res.json();
                
                if(result.success) { 
                    alert("Account creato con successo! Ora puoi accedere."); 
                    window.location.href = "login.html"; 
                } else { 
                    alert("Errore: " + (result.error || "Email già esistente.")); 
                }
            } catch (err) {
                alert("Errore di connessione al server.");
            }
        }
    </script>
</body>
</html>
