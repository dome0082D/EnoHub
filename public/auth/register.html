<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Iscriviti - EnoHub</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="../scripts/api.js"></script>
</head>
<body class="auth-page">
    <div class="auth__content">
        <h2 class="auth__title">Crea il tuo profilo professionale</h2>
        <form id="regForm">
            <div class="auth__form-group">
                <label class="auth__label">Tipo Profilo:</label>
                <select id="tipo" name="tipo" class="auth__input" required>
                    <option value="sommelier">Sommelier / Professionista</option>
                    <option value="cantina">Cantina / Azienda</option>
                </select>
            </div>
            <div class="auth__form-group">
                <input type="text" name="nome" class="auth__input" placeholder="Nome / Ragione Sociale" required>
            </div>
            <div class="auth__form-group">
                <input type="email" name="email" class="auth__input" placeholder="Email (Username)" required>
            </div>
            <div class="auth__form-group">
                <input type="password" name="password" class="auth__input" placeholder="Password" required>
            </div>
            <div class="auth__form-group">
                <label>Foto Profilo / Logo:</label>
                <input type="file" name="foto" class="auth__input" accept="image/*">
            </div>
            <div class="auth__form-group" id="cvField">
                <label>Carica CV (Solo Sommelier):</label>
                <input type="file" name="cv" class="auth__input" accept=".pdf,.doc">
            </div>
            <div class="privacy-check">
                <input type="checkbox" required> <span>Accetto i <a href="../legal/privacy-policy.html">Termini e la Privacy</a> (GDPR)</span>
            </div>
            <button type="submit" class="auth__btn">REGISTRATI</button>
        </form>
    </div>

    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const res = await EnoHubApi.register(formData);
                if(res.success) { alert("Registrazione completata!"); window.location.href="login.html"; }
            } catch(err) { alert("Errore: " + err.message); }
        };
    </script>
</body>
</html>
