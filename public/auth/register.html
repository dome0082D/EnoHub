<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><title>Registrati - EnoHub</title>
    <style>body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; margin: 0; } .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; } input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; } .btn { width: 100%; padding: 12px; background: #8a1c1c; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }</style>
</head>
<body>
    <div class="card">
        <a href="../index.html" style="color:#8a1c1c; text-decoration:none; font-weight:bold;">← Home</a>
        <h2>Crea Account</h2>
        <input type="text" id="nome" placeholder="Nome Completo / Nome Cantina">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <select id="tipo"><option value="Sommelier">Sommelier</option><option value="Cantina">Cantina</option></select>
        <button class="btn" onclick="register()">ISCRIVITI ORA</button>
    </div>
    <script>
        async function register() {
            const data = { nome: nome.value, email: email.value, password: password.value, tipo: tipo.value };
            const r = await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            const j = await r.json();
            if(j.success) { alert("Perfetto! Ora accedi."); window.location.href="login.html"; } else alert("Errore");
        }
    </script>
</body>
</html>
