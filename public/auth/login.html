<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EnoHub - Accedi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #800000; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #800000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #ccc; }
        .auth-footer { margin-top: 20px; font-size: 0.9em; color: #666; }
        a { color: #800000; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Accedi a EnoHub</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="btn_login">ACCEDI</button>
    </form>
    <div class="auth-footer">
        Non hai un account? <a href="register.html">Registrati ora</a><br><br>
        <a href="../index.html" style="color: #666;">← Torna alla Home</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn_login');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.innerText = "VERIFICA IN CORSO...";
        btn.disabled = true;

        try {
            // Chiamata al tuo server Node.js
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (result.success) {
                // SALVATAGGIO PER RICORDARE IL PROFILO
                localStorage.setItem('enohub_token', result.token);
                localStorage.setItem('enohub_user', JSON.stringify(result.user));

                alert("Accesso eseguito! Benvenuto su EnoHub.");
                
                // Redirezione alla Dashboard
                window.location.href = "../dashboard.html";
            } else {
                alert("Errore: " + (result.error || "Credenziali non valide"));
                btn.innerText = "ACCEDI";
                btn.disabled = false;
            }
        } catch (error) {
            console.error(error);
            alert("Errore di connessione al server. Assicurati che sia acceso!");
            btn.innerText = "ACCEDI";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
