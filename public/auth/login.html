<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - EnoHub</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="../scripts/api.js"></script>
</head>
<body>
    <div class="auth__content">
        <h2 class="auth__title">Bentornato su EnoHub</h2>
        <form id="loginForm">
            <input type="email" id="email" class="auth__input" placeholder="Email" required><br><br>
            <input type="password" id="password" class="auth__input" placeholder="Password" required><br><br>
            <button type="submit" class="auth__btn">ACCEDI</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await EnoHubApi.login(document.getElementById('email').value, document.getElementById('password').value);
            if(res.success) window.location.href = "../index.html";
            else alert("Errore: " + res.error);
        };
    </script>
</body>
</html>
