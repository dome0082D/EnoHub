<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub - Login</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="../scripts/api.js"></script>
</head>
<body class="auth-page">
    <div class="auth__content">
        <h2 class="auth__title">Bentornato su EnoHub</h2>
        
        <form id="loginForm">
            <div class="auth__form-group">
                <input type="email" id="email" class="auth__input" placeholder="Email" required>
            </div>
            <div class="auth__form-group">
                <input type="password" id="password" class="auth__input" placeholder="Password" required>
            </div>
            
            <button type="submit" class="auth__btn" id="btnLogin">ACCEDI</button>
        </form>

        <p class="auth__footer">Non hai un account? <a href="register.html">Registrati ora</a></p>
    </div>

    <script>
        // Questa è la logica che "sblocca" il tuo tasto
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impedisce alla pagina di ricaricarsi a vuoto
            
            const btn = document.getElementById('btnLogin');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.innerText = "VERIFICA IN CORSO...";
            btn.disabled = true;

            try {
                const result = await EnoHubApi.login(email, password);
                
                if (result.success) {
                     localStorage.setItem('enohub_token', result.token);
    localStorage.setItem('enohub_user', JSON.stringify(result.user));
    
    alert("Accesso eseguito! Benvenuto su EnoHub.");
    
    // Cambia il percorso per mandare l'utente alla dashboard
    window.location.href = "../dashboard.html"; 
                } else {
                    alert("Errore: " + (result.error || "Credenziali non valide"));
                    btn.innerText = "ACCEDI";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Errore di connessione al server.");
                btn.innerText = "ACCEDI";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
