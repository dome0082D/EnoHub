<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub - Network B2B</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">EnoHub</div>
        <input type="text" id="search" placeholder="Cerca nel network..." onkeyup="cerca()">
        <div class="auth-group">
            <button class="btn-alt" onclick="apriModale('modal-login')">Accedi</button>
            <button class="btn-main" onclick="apriModale('modal-reg')">Iscriviti</button>
        </div>
    </header>

    <section class="pdf-hero">
        <h1>Connettiamo l'eccellenza vinicola</h1>
        <p>Superiamo i limiti dei canali tradizionali con rapporti B2B diretti.</p>
    </section>

    <div class="main-grid">
        <div class="column" id="col-cantine">
            <h2>🍷 Aziende Vinicole</h2>
            <div id="lista-cantine" class="profiles-container"></div>
        </div>

        <div class="column" id="col-sommelier">
            <h2>📜 Sommelier & Expert</h2>
            <div id="lista-sommelier" class="profiles-container"></div>
        </div>
    </div>

    <div id="modal-reg" class="modal">
        <div class="modal-content">
            <span class="close" onclick="chiudiModale('modal-reg')">&times;</span>
            <h2>Crea Profilo Professionale</h2>
            <form id="reg-form">
                <select id="tipo" required>
                    <option value="cantina">Sono una Cantina</option>
                    <option value="sommelier">Sono un Sommelier</option>
                </select>
                <input type="text" id="nome" placeholder="Nome / Ragione Sociale" required>
                <input type="email" id="email" placeholder="Email (Univoca)" required>
                <input type="password" id="pass" placeholder="Password (min. 6 caratteri)" required>
                <input type="tel" id="tel" placeholder="Telefono">
                <input type="text" id="qualifica" placeholder="Qualifica/Specializzazione">
                <textarea id="bio" placeholder="La tua biografia e storia..."></textarea>
                <div class="privacy-box">
                    <input type="checkbox" required> Accetto i <a href="#">Termini Privacy GDPR</a> reali.
                </div>
                <button type="submit" class="btn-full">Registrati</button>
            </form>
        </div>
    </div>

    <div id="modal-chat" class="modal">
        <div class="modal-content chat-box">
            <span class="close" onclick="chiudiModale('modal-chat')">&times;</span>
            <div id="chat-target"></div>
            <div id="chat-msgs"></div>
            <div class="chat-input">
                <input type="text" id="chat-txt" placeholder="Scrivi...">
                <label for="chat-file">📎</label>
                <input type="file" id="chat-file" hidden>
                <button onclick="inviaMsg()">Invia</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
