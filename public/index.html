<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub - Home</title>
    <style>
        :root { --main: #800000; --bg: #fdfdfd; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); }
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: var(--main); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .hero { text-align: center; padding: 100px 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" style="font-size: 24px; font-weight: bold; color: var(--main); text-decoration: none;">EnoHub</a>
        <div id="nav-links">
            <a href="auth/login.html" class="btn">Accedi</a>
        </div>
    </nav>
    <div class="hero">
        <h1 id="welcome-text">Benvenuti su EnoHub</h1>
        <p>La rete professionale per Sommelier e Cantine.</p>
        <div id="cta"></div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('enohub_user'));
        if(user) {
            document.getElementById('nav-links').innerHTML = `
                <a href="dashboard.html" style="margin-right:15px; text-decoration:none; color:var(--main);">Il mio Profilo</a>
                <button onclick="logout()" class="btn" style="background:#555">Esci</button>
            `;
            document.getElementById('welcome-text').innerText = `Bentornato, ${user.nome}`;
            document.getElementById('cta').innerHTML = `<a href="dashboard.html" class="btn">Vai alla Dashboard</a>`;
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
