<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub B2B Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="main-nav">
        <div class="logo" onclick="mostraPagina('home')">EnoHub</div>
        <div id="user-tools">
            <input type="text" id="global-search" placeholder="Cerca nel network..." onkeyup="filtraGlobale()">
            <div id="auth-status"></div>
        </div>
    </nav>

    <main id="app-viewport">
        <section id="page-home" class="page active">
            <div class="hero-pdf">Mission: Storytelling & B2B Integration</div>
            <div class="dual-container">
                <div class="rect-column" onclick="mostraPagina('esplora-cantine')">
                    <h2>Cantine</h2>
                    <div id="preview-cantine" class="mini-grid"></div>
                </div>
                <div class="rect-column" onclick="mostraPagina('esplora-sommelier')">
                    <h2>Sommelier</h2>
                    <div id="preview-sommelier" class="mini-grid"></div>
                </div>
            </div>
        </section>

        <section id="page-esplora-cantine" class="page">
            <aside class="sidebar-filters">
                <h3>Filtra Cantine</h3>
                <input type="text" id="filter-cantina-nome" placeholder="Nome...">
                <input type="text" id="filter-cantina-regione" placeholder="Regione...">
                <input type="text" id="filter-cantina-citta" placeholder="Città...">
                <button onclick="applicaFiltri('cantina')">Applica</button>
            </aside>
            <div id="grid-cantine" class="main-grid"></div>
        </section>

        <section id="page-profilo-dettaglio" class="page">
            <button onclick="history.back()">⬅ Torna indietro</button>
            <div id="profilo-content"></div>
        </section>

        </main>

    <script src="script.js"></script>
</body>
</html>
