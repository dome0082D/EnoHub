<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esplora Cantine - EnoHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">EnoHub</a>
        <div id="user-status"></div>
    </header>

    <div class="layout-multi">
        <aside class="sidebar-filters">
            <h3>Filtra Cantine</h3>
            <input type="text" id="f-nome" placeholder="Cerca per nome..." onkeyup="filtra()">
            <input type="text" id="f-regione" placeholder="Regione..." onkeyup="filtra()">
            <input type="text" id="f-citta" placeholder="Città..." onkeyup="filtra()">
        </aside>

        <section class="grid-container" id="lista-cantine">
            </section>
    </div>

    <script src="main.js"></script>
    <script>window.onload = () => caricaLista('cantina');</script>
</body>
</html>
