<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Impostazioni - EnoHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar"><a href="index.html" class="logo">EnoHub</a></header>
    <main class="container" style="max-width: 600px; margin: 50px auto;">
        <div class="profile-card">
            <h2>Gestione Account & Privacy</h2>
            <hr>
            <div style="margin: 20px 0;">
                <h3>Esporta i tuoi dati</h3>
                <p>Scarica un file JSON con tutte le tue interazioni.</p>
                <button class="btn-download">Scarica Archivio</button>
            </div>
            
            <div style="margin: 40px 0; border: 1px solid #ffcccc; padding: 20px; border-radius: 10px;">
                <h3 style="color: red;">Zona Pericolosa</h3>
                <p>La cancellazione è immediata e rimuoverà il tuo profilo, le foto, i CV e tutti i messaggi inviati.</p>
                <button onclick="eliminaAccount()" style="background: red; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">
                    ELIMINA ACCOUNT DEFINITIVAMENTE
                </button>
            </div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
