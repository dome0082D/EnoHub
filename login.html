<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - EnoHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <form id="login-form" class="profile-card" style="max-width: 400px; margin: 100px auto;">
            <h2 style="color: var(--primary); text-align: center;">Accedi a EnoHub</h2>
            <div class="filter-group">
                <input type="email" id="l-email" placeholder="Email" required>
                <input type="password" id="l-pass" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">ENTRA</button>
            <p style="margin-top: 15px; text-align: center;">Non hai un account? <a href="iscrizione.html" style="color: var(--primary);">Registrati</a></p>
        </form>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;

            const res = await fetch('/api/utenti');
            const utenti = await res.json();
            
            // Simulazione login (Livello 8)
            const user = utenti.find(u => u.email === email); // Nota: in produzione servirebbe check password lato server
            if(user) {
                localStorage.setItem('enoUser', JSON.stringify(user));
                location.href = 'index.html';
            } else {
                alert("Credenziali errate");
            }
        };
    </script>
</body>
</html>
